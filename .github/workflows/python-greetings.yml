name: Python greetings

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:
    inputs:
      name:
        type: string
        default: 'World'
        description: 'Name input'
        required: true
        
jobs:
  install-pip-deps:
    runs-on: self-hosted
    
    steps:
      # Runs a single command using the runners shell
      - name: Print-info
        run: echo Installing pip dependencies.
      
          
      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false
          
      - name: Create-virtual-environment
        working-directory: python-greetings
        run: python -m venv venv
        
      - name: Install-libraries
        working-directory: python-greetings
        run: .\venv\Scripts\python -m pip install -r requirements.txt
        
  deploy-to-dev:
    needs: install-pip-deps
    runs-on: self-hosted
    steps:
      - name: Print-info
        run: echo Deploying to dev.


      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Create-virtual-environment
        working-directory: python-greetings
        run: python -m venv venv

      - name: Install-libraries
        working-directory: python-greetings
        run: .\venv\Scripts\python -m pip install -r requirements.txt

      - name: Stop-existing-service
        shell: cmd
        working-directory: python-greetings
        run: pm2 delete greetings-app-dev & set "errorlevel=0"

      - name: Start-service
        shell: cmd
        working-directory: python-greetings
        run: set PORT=7001 && set RUNNER_TRACKING_ID= && pm2 start app.py --name greetings-app-dev --interpreter "%CD%\venv\Scripts\python.exe"

          
  tests-on-dev:
    needs: deploy-to-dev
    runs-on: self-hosted
    steps:
    
      - name: Print-info
        run: echo Testing on dev.



      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
          clean: false

      - name: Install-libraries
        working-directory: course-js-api-framework
        run: npm install

      - name: Run-tests-dev
        working-directory: course-js-api-framework
        run: npm run greetings -- greetings_dev
        
  deploy-to-stg:
    needs: tests-on-dev
    # The type of runner that the job will run on
    runs-on: self-hosted
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Runs a single command using the runners shell
      - name: Print-info
        run: echo Deploying to staging.

      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Create-virtual-environment
        working-directory: python-greetings
        run: python -m venv venv

      - name: Install-libraries
        working-directory: python-greetings
        run: .\venv\Scripts\python -m pip install -r requirements.txt
          
      - name: Stop-stg-service
        shell: cmd
        working-directory: python-greetings
        run: pm2 delete greetings-app-stg & set "errorlevel=0"

      - name: Start-stg-service
        shell: cmd
        working-directory: python-greetings
        run: set PORT=7002 && set RUNNER_TRACKING_ID= && pm2 start app.py --name greetings-app-stg --interpreter "%CD%\venv\Scripts\python.exe"
        
  tests-on-stg:
    needs: deploy-to-stg
    runs-on: self-hosted
    steps:
      - name: Print-info
        run: echo Testing on staging.
        

      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
          clean: false

      - name: Install-libraries
        working-directory: course-js-api-framework
        run: npm install

      - name: Run-tests-stg
        working-directory: course-js-api-framework
        run: npm run greetings -- greetings_stg


        
  deploy-to-preprod:
    needs: tests-on-stg
    # The type of runner that the job will run on
    runs-on: self-hosted
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Runs a single command using the runners shell
      - name: Print-info
        run: echo Deploying to preprod.


      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Create-virtual-environment
        working-directory: python-greetings
        run: python -m venv venv

      - name: Install-libraries
        working-directory: python-greetings
        run: .\venv\Scripts\python -m pip install -r requirements.txt

      - name: Stop-preprod-service
        shell: cmd
        working-directory: python-greetings
        run: pm2 delete greetings-app-preprod & set "errorlevel=0"

      - name: Start-preprod-service
        shell: cmd
        working-directory: python-greetings
        run: set PORT=7003 && set RUNNER_TRACKING_ID= && pm2 start app.py --name greetings-app-preprod --interpreter "%CD%\venv\Scripts\python.exe"

  tests-on-preprod:
    needs: deploy-to-preprod
    runs-on: self-hosted
    steps:

      - name: Print-info
        run: echo Testing on preprod.


      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
          clean: false

      - name: Install-node-libraries
        working-directory: course-js-api-framework
        run: npm install

      - name: Run-tests-preprod
        working-directory: course-js-api-framework
        run: npm run greetings -- greetings_preprod  
        
  deploy-to-prod:
    needs: tests-on-preprod
    # The type of runner that the job will run on
    runs-on: self-hosted
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Runs a single command using the runners shell
      - name: Print-info
        run: echo Deploying to prod.

      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          clean: false

      - name: Create-virtual-environment
        working-directory: python-greetings
        run: python -m venv venv

      - name: Install-libraries
        working-directory: python-greetings
        run: .\venv\Scripts\python -m pip install -r requirements.txt

      - name: Stop-prod-service
        shell: cmd
        working-directory: python-greetings
        run: pm2 delete greetings-app-prod & set "errorlevel=0"

      - name: Start-prod-service
        shell: cmd
        working-directory: python-greetings
        run: set PORT=7004 && set RUNNER_TRACKING_ID= && pm2 start app.py --name greetings-app-prod --interpreter "%CD%\venv\Scripts\python.exe"
        
  tests-on-prod:
    needs: deploy-to-prod
    runs-on: self-hosted
    steps:
      # Runs a single command using the runners shell
      - name: Print-info
        run: echo Testing on prod.


      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
