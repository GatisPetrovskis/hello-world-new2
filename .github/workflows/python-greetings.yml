# This is a basic workflow to help you get started with Actions

name: Python greetings


# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      name:
        type: string
        default: 'World'
        description: 'Name input'
        required: true
        

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  install-pip-deps:
    runs-on: self-hosted
    
    steps:
      # Runs a single command using the runners shell
      - name: Print-info
        run: echo Installing pip dependencies.
        
      - name: Call-actions-repository
        uses: actions/checkout@v6
        
      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          
      - name: Create-virtual-environment
        working-directory: python-greetings
        run: python -m venv venv
        
      - name: Install-libraries
        working-directory: python-greetings
        run: .\venv\Scripts\python -m pip install -r requirements.txt
        
  deploy-to-dev:
    needs: install-pip-deps
    runs-on: self-hosted
    steps:
      - name: Print-info
        run: echo Deploying to dev.
        
      - name: Call-actions-repository
        uses: actions/checkout@v6

      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Create-virtual-environment
        working-directory: python-greetings
        run: python -m venv venv

      - name: Install-libraries
        working-directory: python-greetings
        run: .\venv\Scripts\python -m pip install -r requirements.txt

      - name: Stop-existing-service
        shell: cmd
        working-directory: python-greetings
        run: pm2 delete greetings-app-dev & set "errorlevel=0"

      - name: Start-service
        shell: cmd
        working-directory: python-greetings
        run: set PORT=7001 && pm2 start app.py --name greetings-app-dev --interpreter "%CD%\venv\Scripts\python.exe"

      - name: Wait-for-dev-service
        shell: powershell
        working-directory: python-greetings
        run: |
          $maxAttempts = 15
          $attempt = 0
          do {
            $attempt++
            Start-Sleep -Seconds 2
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:7001/greetings" -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -eq 200) {
                Write-Output "Dev service is ready."
                exit 0
              }
            } catch {
              Write-Output "Dev service not ready yet. Attempt $attempt of $maxAttempts."
            }
          } while ($attempt -lt $maxAttempts)

          Write-Error "Dev service did not become ready in time."
          exit 1
          
  tests-on-dev:
    needs: deploy-to-dev
    runs-on: self-hosted
    steps:
    
      - name: Print-info
        run: echo Testing on dev.

      - name: Call-actions-repository
        uses: actions/checkout@v6

      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install-libraries
        working-directory: course-js-api-framework
        run: npm install

      - name: Run-tests-dev
        working-directory: course-js-api-framework
        run: npm run greetings greetings_dev
        
  deploy-to-stg:
    needs: tests-on-dev
    # The type of runner that the job will run on
    runs-on: self-hosted
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Runs a single command using the runners shell
      - name: Print-info
        run: echo Deploying to staging.

      - name: Call-actions-repository
        uses: actions/checkout@v6

      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Create-virtual-environment
        working-directory: python-greetings
        run: python -m venv venv

      - name: Install-libraries
        working-directory: python-greetings
        run: .\venv\Scripts\python -m pip install -r requirements.txt
          
      - name: Stop-stg-service
        shell: cmd
        working-directory: python-greetings
        run: pm2 delete greetings-app-stg & set "errorlevel=0"

      - name: Start-stg-service
        shell: cmd
        working-directory: python-greetings
        run: set PORT=7002 && pm2 start app.py --name greetings-app-stg --interpreter "%CD%\venv\Scripts\python.exe"
        
  tests-on-stg:
    needs: deploy-to-stg
    runs-on: self-hosted
    steps:
      - name: Print-info
        run: echo Testing on staging.
        
      - name: Call-actions-repository
        uses: actions/checkout@v6

      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install-libraries
        working-directory: course-js-api-framework
        run: npm install

      - name: Run-tests-stg
        working-directory: course-js-api-framework
        run: npm run greetings greetings_stg

      
        
  deploy-to-preprod:
    needs: tests-on-stg
    # The type of runner that the job will run on
    runs-on: self-hosted
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Runs a single command using the runners shell
      - name: Print-info
        run: echo Deploying to preprod.

      - name: Call-actions-repository
        uses: actions/checkout@v6

      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Create-virtual-environment
        working-directory: python-greetings
        run: python -m venv venv

      - name: Install-libraries
        working-directory: python-greetings
        run: .\venv\Scripts\python -m pip install -r requirements.txt

      - name: Stop-preprod-service
        shell: cmd
        working-directory: python-greetings
        run: pm2 delete greetings-app-preprod & set "errorlevel=0"

      - name: Start-preprod-service
        shell: cmd
        working-directory: python-greetings
        run: set PORT=7003 && pm2 start app.py --name greetings-app-preprod --interpreter "%CD%\venv\Scripts\python.exe"

  tests-on-preprod:
    needs: deploy-to-preprod
    runs-on: self-hosted
    steps:

      - name: Print-info
        run: echo Testing on preprod.

      - name: Call-actions-repository
        uses: actions/checkout@v6

      - name: Repository-cloning
        uses: actions/checkout@v6
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework

      - name: Install-node-libraries
        working-directory: course-js-api-framework
        run: npm install

      - name: Run-tests-preprod
        working-directory: course-js-api-framework
        run: npm run greetings greetings_preprod  
        
  deploy-to-prod:
    needs: tests-on-preprod
    # The type of runner that the job will run on
    runs-on: self-hosted
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
